---
- name: Asignar IPv6 a Loopback 33
  hosts: routers
  gather_facts: no
  tasks:
    - name: Configurar direccionamiento IPv6
      cisco.ios.ios_config:
        lines:
          - ipv6 address 3001:ABCD:ABCD:1::1/128
          - ipv6 address FE80::1 link-local
        parents: interface Loopback33